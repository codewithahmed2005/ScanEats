<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanEats - Login / Signup</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display:none;">
        <div class="spinner"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <a href="index.html" class="logo" style="text-decoration:none;">
                <i class="fas fa-qrcode"></i> ScanEats
            </a>
            <h2 id="formTitle">Welcome Back</h2>
            
            <div id="errorMsg" class="error-msg"></div>

            <!-- FIX: novalidate + onsubmit handler -->
            <form id="authForm" novalidate onsubmit="return false;">
                <div id="signupFields" style="display:none;">
                    <!-- FIX: removed required attribute -->
                    <input type="text" id="restaurant_name" placeholder="Restaurant Name">
                    <input type="text" id="owner_name" placeholder="Owner Name">
                </div>
                <input type="email" id="email" placeholder="Email Address" required>
                
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Password" required>
                    <span class="toggle-password" id="togglePassword">👁️</span>
                </div>
                
                <button type="submit" class="btn-primary" id="submitBtn">Login</button>
            </form>
            
            <p class="toggle-text">
                <span id="toggleText">Don't have an account?</span>
                <a href="#" id="toggleForm">Sign up here</a>
            </p>
            
            <a href="index.html" class="auth-back-link">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
